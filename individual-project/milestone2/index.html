<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Milestone 2 | Book Search</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="app.js" defer></script>
</head>
<body>

<header>
  <h1>Milestone 2: Google Books Application</h1>
  <p>Chris Henning | IT 4403 – Advanced Web and Mobile Applications</p>
  <nav>
    <a class="active" href="index.html">Home</a>
    <a href="bookshelf.html">My Bookshelf</a>
  </nav>
</header>

<main>
  <section class="section-pad">
    <h2>Book Search</h2>
    <p>Search Google Books by keyword and view up to 60 results with pagination.</p>

    <div class="controls">
      <div class="search-group">
        <label for="searchTerm" class="small">Search for books</label>
        <div class="search-row">
          <input type="text" id="searchTerm" placeholder="Enter search terms, such as web development">
          <button id="searchBtn">Search</button>
        </div>
      </div>
    
      <div class="page-group" id="pageGroup" style="display:none;">
        <label for="pageSelect" class="small">Page</label>
        <select id="pageSelect" aria-label="Select page number"></select>
      </div>
    </div>
    
    <p id="resultSummary" class="small" style="margin-top:12px;"></p>
  </section>

  <div id="results"></div>
</main>

<footer>
  <p>&copy; 2026 Chris Henning</p>
</footer>

<script>
  $(function () {
    $("#searchBtn").on("click", function () {
      runSearch(1);
    });

    $("#searchTerm").on("keydown", function (e) {
      if (e.which === 13) {
        runSearch(1);
      }
    });

    $("#pageSelect").on("change", function () {
      const page = parseInt($(this).val(), 10);
      runSearch(page);
    });
  });
</script>

</body>
</html>
