<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Milestone 3 - Google Books SPA</title>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --brand: #0b3c5d;
      --brand-light: #1e5f8a;
      --border: #dbe4ee;
      --shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    header {
      background: linear-gradient(135deg, var(--brand), var(--brand-light));
      color: white;
      padding: 28px 20px;
      text-align: center;
      box-shadow: var(--shadow);
    }

    header h1 {
      margin: 0 0 8px;
      font-size: 2rem;
    }

    header p {
      margin: 0;
      opacity: 0.95;
    }

    .container {
      max-width: 1300px;
      margin: 24px auto;
      padding: 0 16px 32px;
    }

    .controls,
    .layout {
      display: grid;
      gap: 20px;
    }

    .controls {
      grid-template-columns: 1fr auto;
      align-items: center;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      box-shadow: var(--shadow);
    }

    .search-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    input[type="text"] {
      flex: 1;
      min-width: 220px;
      padding: 12px 14px;
      border: 1px solid #c7d4e2;
      border-radius: 10px;
      font-size: 1rem;
    }

    button {
      border: none;
      background: var(--brand);
      color: white;
      padding: 12px 18px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover { background: var(--brand-light); }
    button:disabled {
      background: #94a3b8;
      cursor: not-allowed;
    }

    .layout {
      grid-template-columns: 2fr 1fr;
      align-items: start;
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px;
      box-shadow: var(--shadow);
    }

    .panel h2 {
      margin-top: 0;
      font-size: 1.2rem;
      color: var(--brand);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 16px;
    }

    .book-card {
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      background: #fff;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
      min-height: 280px;
      display: flex;
      flex-direction: column;
    }

    .book-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 18px rgba(0,0,0,0.10);
    }

    .book-card img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      background: #eef3f8;
    }

    .book-card .info {
      padding: 12px;
    }

    .book-card h3 {
      margin: 0;
      font-size: 0.98rem;
      line-height: 1.3;
    }

    .small-text {
      color: var(--muted);
      font-size: 0.9rem;
    }

    .pagination {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    .page-btn {
      background: #e7eef6;
      color: var(--text);
      font-weight: bold;
      padding: 10px 14px;
      border-radius: 8px;
    }

    .page-btn.active {
      background: var(--brand);
      color: white;
    }

    .details-box {
      min-height: 300px;
    }

    .details-box img {
      max-width: 180px;
      width: 100%;
      border-radius: 10px;
      display: block;
      margin-bottom: 14px;
      border: 1px solid var(--border);
    }

    .detail-meta {
      margin: 8px 0;
    }

    .status {
      margin-top: 10px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .two-sections {
      display: grid;
      gap: 24px;
    }

    .empty {
      color: var(--muted);
      padding: 10px 0;
    }

    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
    }

    @media (max-width: 640px) {
      .controls { grid-template-columns: 1fr; }
      header h1 { font-size: 1.6rem; }
    }

    footer{
      text-align:center;
      color:var(--muted);
      padding:16px 0 28px;
    }
  </style>
</head>
<body>
  <header>
    <h1>Google Books Single Page Application</h1>
    <p>Search books, browse a public bookshelf, and view details without reloading the page.</p>
  </header>

  <main class="container">
    <section class="controls">
      <div class="search-row">
        <input type="text" id="searchInput" placeholder="Search books by keyword, title, or author" />
        <button id="searchBtn">Search</button>
      </div>
      <div class="small-text" id="searchSummary">Ready to search</div>
    </section>

    <section class="layout">
      <div class="two-sections">
        <section class="panel">
          <h2>Search Results</h2>
          <div id="searchResults" class="grid"></div>
          <div id="searchPagination" class="pagination"></div>
          <div id="searchStatus" class="status"></div>
        </section>

        <section class="panel">
          <h2>My Public Bookshelf</h2>
          <div id="bookshelfResults" class="grid"></div>
          <div id="bookshelfStatus" class="status"></div>
        </section>
      </div>

      <aside class="panel details-box">
        <h2>Book Details</h2>
        <div id="detailsContent" class="empty">Click a book from the search results or bookshelf to see full details here.</div>
      </aside>
    </section>
  </main>
  
<footer>
  <p>&copy; 2026 Chris Henning</p>
</footer>
  
  <script>
    const API_KEY = "AIzaSyC85nafC7d-uh3cy8Qtez2jjRB3YwZ_TGA";

    const MY_BOOKSHELF_IDS = [
      "r10U16kgmkwC",
      "pQ4Uil0Nml0C",
      "y-9wCgAAQBAJ",
      "O4idLMoEc4wC",
      "L6IWAgAAQBAJ"
    ];

    // Replace these with your Google user ID and public bookshelf ID.
    // Example pattern:
    // https://www.googleapis.com/books/v1/users/USER_ID/bookshelves/BOOKSHELF_ID/volumes
   

    const SEARCH_RESULTS_PER_PAGE = 10;
    const MAX_RESULTS = 40;

    let currentSearchResults = [];
    let currentPage = 1;

    function buildUrl(base, params = {}) {
      const url = new URL(base);
      Object.entries(params).forEach(([key, value]) => {
        if (value !== undefined && value !== null && value !== "") {
          url.searchParams.set(key, value);
        }
      });
      return url.toString();
    }

    function getThumbnail(volumeInfo) {
      return volumeInfo?.imageLinks?.thumbnail
        || volumeInfo?.imageLinks?.smallThumbnail
        || "https://via.placeholder.com/128x190?text=No+Cover";
    }

    function safeText(value, fallback = "Not available") {
      return value ? value : fallback;
    }

    function truncate(text, maxLength = 110) {
      if (!text) return "No description available.";
      return text.length > maxLength ? text.slice(0, maxLength) + "..." : text;
    }

    function renderCards(items, targetSelector) {
      const $target = $(targetSelector);
      $target.empty();

      if (!items || !items.length) {
        $target.html('<div class="empty">No books found.</div>');
        return;
      }

      items.forEach(item => {
        const info = item.volumeInfo || {};
        const card = $(`
          <article class="book-card" data-id="${item.id}">
            <img src="${getThumbnail(info)}" alt="Book cover for ${safeText(info.title, 'Untitled book')}" />
            <div class="info">
              <h3>${safeText(info.title, 'Untitled')}</h3>
              <div class="small-text">${safeText((info.authors || []).join(', '), 'Unknown author')}</div>
            </div>
          </article>
        `);

        card.on('click', function () {
          loadBookDetails(item.id);
        });

        $target.append(card);
      });
    }

    function renderPagination() {
      const totalPages = Math.ceil(currentSearchResults.length / SEARCH_RESULTS_PER_PAGE);
      const $pagination = $('#searchPagination');
      $pagination.empty();

      if (totalPages <= 1) return;

      for (let i = 1; i <= totalPages; i++) {
        const btn = $(`<button class="page-btn ${i === currentPage ? 'active' : ''}">${i}</button>`);
        btn.on('click', function () {
          currentPage = i;
          renderSearchPage();
        });
        $pagination.append(btn);
      }
    }

    function renderSearchPage() {
      const start = (currentPage - 1) * SEARCH_RESULTS_PER_PAGE;
      const end = start + SEARCH_RESULTS_PER_PAGE;
      const pageItems = currentSearchResults.slice(start, end);

      renderCards(pageItems, '#searchResults');
      renderPagination();
      $('#searchStatus').text(`Showing page ${currentPage} of ${Math.max(1, Math.ceil(currentSearchResults.length / SEARCH_RESULTS_PER_PAGE))}`);
    }
    function searchBooks() {
      const query = $('#searchInput').val().trim();
    
      if (!query) {
        $('#searchStatus').text('Please enter a search term.');
        $('#searchResults').empty();
        $('#searchPagination').empty();
        return;
      }
    
      $('#searchSummary').text(`Searching for "${query}"...`);
      $('#searchStatus').text('Loading search results...');
    
      const request1 = $.getJSON(buildUrl('https://www.googleapis.com/books/v1/volumes', {
        q: query,
        startIndex: 0,
        maxResults: 40,
        key: API_KEY
      }));
    
      const request2 = $.getJSON(buildUrl('https://www.googleapis.com/books/v1/volumes', {
        q: query,
        startIndex: 40,
        maxResults: 10,
        key: API_KEY
      }));
    
      $.when(request1, request2)
        .done(function (response1, response2) {
          const items1 = response1[0].items || [];
          const items2 = response2[0].items || [];
    
          currentSearchResults = [...items1, ...items2];
          currentPage = 1;
          renderSearchPage();
          $('#searchSummary').text(`Results for "${query}"`);
    
          if (!currentSearchResults.length) {
            $('#searchStatus').text('No results found for that search.');
          }
        })
        .fail(function (xhr) {
          $('#searchSummary').text('Search failed');
          $('#searchStatus').text('Error loading search results.');
          $('#searchResults').empty();
          $('#searchPagination').empty();
        });
    }
    
    function loadBookDetails(volumeId) {
      $('#detailsContent').html('<p class="small-text">Loading details...</p>');

      $.getJSON(buildUrl(`https://www.googleapis.com/books/v1/volumes/${volumeId}`, {
        key: API_KEY
      }))
      .done(function (data) {
        const info = data.volumeInfo || {};
        const authors = info.authors ? info.authors.join(', ') : 'Unknown author';
        const categories = info.categories ? info.categories.join(', ') : 'Not available';
        const publishedDate = info.publishedDate || 'Not available';
        const description = info.description || 'No description available.';

        $('#detailsContent').html(`
          <img src="${getThumbnail(info)}" alt="Book cover for ${safeText(info.title, 'Untitled book')}" />
          <h3>${safeText(info.title, 'Untitled')}</h3>
          <div class="detail-meta"><strong>Author(s):</strong> ${authors}</div>
          <div class="detail-meta"><strong>Published:</strong> ${publishedDate}</div>
          <div class="detail-meta"><strong>Categories:</strong> ${categories}</div>
          <div class="detail-meta"><strong>Publisher:</strong> ${safeText(info.publisher)}</div>
          <div class="detail-meta"><strong>Page Count:</strong> ${safeText(info.pageCount, 'Not available')}</div>
          <p>${description}</p>
        `);
      })
      .fail(function (xhr) {
        $('#detailsContent').html(`<p class="small-text">Could not load details: ${xhr.status} ${xhr.statusText}</p>`);
      });
    }

    function loadBookshelf() {
      $('#bookshelfStatus').text('Loading bookshelf...');

    const requests = MY_BOOKSHELF_IDS.map(id =>
      $.getJSON(`https://www.googleapis.com/books/v1/volumes/${id}?key=${API_KEY}`)
    );

    $.when(...requests)
      .done(function () {
        let results = [];

        for (let i = 0; i < arguments.length; i++) {
        results.push(arguments[i][0]);
        }

        renderCards(results, '#bookshelfResults');
        $('#bookshelfStatus').text('Custom bookshelf loaded.');
      })
      .fail(function () {
        $('#bookshelfStatus').text('Error loading bookshelf.');
        $('#bookshelfResults').html('<div class="empty">Unable to load bookshelf.</div>');
      });
  }

    $(document).ready(function () {
      $('#searchBtn').on('click', searchBooks);

      $('#searchInput').on('keypress', function (e) {
        if (e.which === 13) {
          searchBooks();
        }
      });

      loadBookshelf();
    });
  </script>
</body>
</html>
