<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Milestone 3 - Google Books SPA</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>
  <header>
    <h1>Google Books Single Page Application</h1>
    <p>Search books, browse a public bookshelf, and view details without reloading the page.</p>
  </header>

  <main class="container">
    <section class="controls">
      <div class="search-row">
        <input type="text" id="searchInput" placeholder="Search books by keyword, title, or author" />
        <button id="searchBtn">Search</button>
      </div>
      <div class="small-text" id="searchSummary">Ready to search</div>
    </section>

    <section class="layout">
      <div class="two-sections">
        <section class="panel">
          <h2>Search Results</h2>
          <div id="searchResults" class="grid"></div>
          <div id="searchPagination" class="pagination"></div>
          <div id="searchStatus" class="status"></div>
        </section>

        <section class="panel">
          <h2>My Public Bookshelf</h2>
          <div id="bookshelfResults" class="grid"></div>
          <div id="bookshelfStatus" class="status"></div>
        </section>
      </div>

      <aside class="panel details-box">
        <h2>Book Details</h2>
        <div id="detailsContent" class="empty">Click a book from the search results or bookshelf to see full details here.</div>
      </aside>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 Chris Henning</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
