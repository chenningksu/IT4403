<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Milestone 1 - Google Books (Single Book)</title>

  <style>
    :root{
      --bg:#f4f6f8; --card:#fff; --text:#111827; --muted:#4b5563;
      --brand:#0b3c5d; --border:#e5e7eb;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);line-height:1.5}
    header{background:var(--brand);color:#fff;padding:22px 16px}
    header h1{margin:0 0 6px;font-size:1.6rem}
    header p{margin:0;color:rgba(255,255,255,.85)}
    main{max-width:1100px;margin:0 auto;padding:18px 16px 40px}
    .crumbs{font-size:.95rem;color:var(--muted);margin-bottom:14px}
    .card{background:var(--card);border:1px solid var(--border);border-radius:14px;box-shadow:0 1px 8px rgba(0,0,0,.06)}
    .content{padding:16px}
    .grid{display:grid;grid-template-columns:220px 1fr;gap:16px}
    @media (max-width:820px){.grid{grid-template-columns:1fr}}
    .cover{width:100%;border:1px solid var(--border);border-radius:10px;background:#fff}
    .kvs{display:grid;grid-template-columns:180px 1fr;gap:10px;margin-top:12px}
    @media (max-width:820px){.kvs{grid-template-columns:1fr}}
    .k{color:var(--muted);font-size:.92rem}
    .v{color:var(--text)}
    .pill{display:inline-block;background:#eef2ff;border:1px solid #e0e7ff;color:#1e3a8a;padding:4px 8px;border-radius:999px;font-size:.85rem;margin:3px 6px 0 0}
    .links a{display:inline-block;margin:6px 10px 0 0}
    .desc{margin-top:10px;border-top:1px solid var(--border);padding-top:12px}
    .small{font-size:.92rem;color:var(--muted)}
    .err{background:#fff1f2;border:1px solid #ffe4e6;color:#9f1239;padding:12px;border-radius:12px}
  </style>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>
  <header>
    <h1>Google Books JSON — Single Book Display</h1>
    <p>IT 4403 Individual Project • Milestone 1 • Chris Henning</p>
  </header>

  <main>
    <div class="crumbs">
      Data source: <span class="small">google-books-book.json</span>
    </div>

    <div id="status" class="small">Loading JSON…</div>
    <div id="app" class="card" style="display:none;">
      <div class="content" id="book"></div>
    </div>
  </main>

  <script>
    function safeText(x){
      if (x === null || x === undefined) return "";
      return String(x);
    }
    function joinArr(arr){
      if (!Array.isArray(arr) || arr.length === 0) return "";
      return arr.join(", ");
    }
    function yesNo(val){
      return val ? "Yes" : "No";
    }

    $(function(){
      $.getJSON("google-books-book.json")
        .done(function(data){
          $("#status").hide();
          $("#app").show();

          var v = data.volumeInfo || {};
          var s = data.saleInfo || {};
          var a = data.accessInfo || {};

          // pick a nice cover image if possible
          var img = (v.imageLinks && (v.imageLinks.large || v.imageLinks.medium || v.imageLinks.thumbnail || v.imageLinks.smallThumbnail)) || "";

          var identifiers = "";
          if (Array.isArray(v.industryIdentifiers)){
            identifiers = v.industryIdentifiers.map(function(it){
              return safeText(it.type) + ": " + safeText(it.identifier);
            }).join(" • ");
          }

          var categoriesHtml = "";
          if (Array.isArray(v.categories)){
            categoriesHtml = v.categories.map(function(c){
              return '<span class="pill">' + safeText(c) + '</span>';
            }).join("");
          }

          var linksHtml = '<div class="links">';
          if (v.previewLink) linksHtml += '<a href="' + v.previewLink + '" target="_blank" rel="noopener">Preview</a>';
          if (v.infoLink) linksHtml += '<a href="' + v.infoLink + '" target="_blank" rel="noopener">Info</a>';
          if (v.canonicalVolumeLink) linksHtml += '<a href="' + v.canonicalVolumeLink + '" target="_blank" rel="noopener">Canonical</a>';
          if (data.selfLink) linksHtml += '<a href="' + data.selfLink + '" target="_blank" rel="noopener">API Self Link</a>';
          if (a.webReaderLink) linksHtml += '<a href="' + a.webReaderLink + '" target="_blank" rel="noopener">Web Reader</a>';
          linksHtml += '</div>';

          var descHtml = "";
          if (v.description){
            // Google Books descriptions often contain HTML (like <p>…</p>), so render it directly.
            descHtml = '<div class="desc"><h3 style="margin:0 0 8px;">Description</h3>' + v.description + '</div>';
          }

          var html = ''
            + '<div class="grid">'
            +   '<div>'
            +     (img ? '<img class="cover" alt="Book cover" src="' + img + '">' : '<div class="cover small" style="padding:10px;">No image available</div>')
            +     '<div class="small" style="margin-top:10px;">Volume ID: <b>' + safeText(data.id) + '</b></div>'
            +     '<div class="small">Kind: ' + safeText(data.kind) + '</div>'
            +   '</div>'
            +   '<div>'
            +     '<h2 style="margin:0 0 6px;">' + safeText(v.title) + '</h2>'
            +     (v.subtitle ? '<div class="small" style="margin-bottom:8px;">' + safeText(v.subtitle) + '</div>' : '')
            +     (categoriesHtml ? '<div style="margin:6px 0 8px;">' + categoriesHtml + '</div>' : '')
            +     linksHtml
            +     '<div class="kvs">'
            +       '<div class="k">Authors</div><div class="v">' + (joinArr(v.authors) || "N/A") + '</div>'
            +       '<div class="k">Publisher</div><div class="v">' + (safeText(v.publisher) || "N/A") + '</div>'
            +       '<div class="k">Published Date</div><div class="v">' + (safeText(v.publishedDate) || "N/A") + '</div>'
            +       '<div class="k">Print Type</div><div class="v">' + (safeText(v.printType) || "N/A") + '</div>'
            +       '<div class="k">Page Count</div><div class="v">' + (safeText(v.pageCount) || "N/A") + '</div>'
            +       '<div class="k">Language</div><div class="v">' + (safeText(v.language) || "N/A") + '</div>'
            +       '<div class="k">Rating</div><div class="v">' + (safeText(v.averageRating) || "N/A") + (v.ratingsCount ? (' (from ' + v.ratingsCount + ' ratings)') : '') + '</div>'
            +       '<div class="k">Identifiers</div><div class="v">' + (identifiers || "N/A") + '</div>'
            +       '<div class="k">Saleability</div><div class="v">' + (safeText(s.saleability) || "N/A") + '</div>'
            +       '<div class="k">Viewability</div><div class="v">' + (safeText(a.viewability) || "N/A") + '</div>'
            +       '<div class="k">Embeddable</div><div class="v">' + yesNo(a.embeddable) + '</div>'
            +       '<div class="k">Public Domain</div><div class="v">' + yesNo(a.publicDomain) + '</div>'
            +       '<div class="k">EPUB Available</div><div class="v">' + (a.epub ? yesNo(a.epub.isAvailable) : "N/A") + '</div>'
            +       '<div class="k">PDF Available</div><div class="v">' + (a.pdf ? yesNo(a.pdf.isAvailable) : "N/A") + '</div>'
            +     '</div>'
            +     descHtml
            +   '</div>'
            + '</div>';

          $("#book").html(html);
        })
        .fail(function(){
          $("#status").html('<div class="err"><b>Error:</b> Could not load google-books-book.json. Make sure the JSON file is in the same folder and you are running from a web server (your Azure site or Live Server).</div>');
        });
    });
  </script>
</body>
</html>
