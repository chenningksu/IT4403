<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Milestone 1 - Google Books (Search Results)</title>

  <style>
    :root{--bg:#f4f6f8;--card:#fff;--text:#111827;--muted:#4b5563;--brand:#0b3c5d;--border:#e5e7eb;}
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);line-height:1.5}
    header{background:var(--brand);color:#fff;padding:22px 16px}
    header h1{margin:0 0 6px;font-size:1.6rem}
    header p{margin:0;color:rgba(255,255,255,.85)}
    main{max-width:1100px;margin:0 auto;padding:18px 16px 40px}
    .toolbar{display:flex;gap:10px;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap}
    .small{font-size:.92rem;color:var(--muted)}
    .btn{border:1px solid var(--border);background:#fff;border-radius:10px;padding:8px 10px;cursor:pointer}
    .btn:hover{background:#f9fafb}
    .grid{display:grid;grid-template-columns:repeat(3, 1fr);gap:12px}
    @media (max-width:980px){.grid{grid-template-columns:repeat(2,1fr)}}
    @media (max-width:620px){.grid{grid-template-columns:1fr}}
    .list{display:grid;grid-template-columns:1fr;gap:12px}
    .card{background:var(--card);border:1px solid var(--border);border-radius:14px;box-shadow:0 1px 8px rgba(0,0,0,.06);overflow:hidden}
    .row{display:grid;grid-template-columns:96px 1fr;gap:12px;padding:12px}
    .thumb{width:96px;height:auto;border:1px solid var(--border);border-radius:10px;background:#fff}
    .title{margin:0;font-size:1.05rem}
    .meta{color:var(--muted);font-size:.92rem;margin-top:2px}
    .snippet{margin:8px 0 0}
    .links a{display:inline-block;margin:8px 10px 0 0}
    .err{background:#fff1f2;border:1px solid #ffe4e6;color:#9f1239;padding:12px;border-radius:12px}
  </style>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>

<body>
  <header>
    <h1>Google Books JSON — Search Results Display</h1>
    <p>IT 4403 Individual Project • Milestone 1 • Chris Henning</p>
  </header>

  <main>
    <div class="toolbar">
      <div class="small">Data source: <b>google-books-search.json</b></div>
      <div>
        <button class="btn" id="gridBtn" type="button">Grid View</button>
        <button class="btn" id="listBtn" type="button">List View</button>
      </div>
    </div>

    <div id="status" class="small">Loading JSON…</div>
    <div id="results" class="grid" style="display:none;"></div>
  </main>

  <script>
    function safeText(x){
      if (x === null || x === undefined) return "";
      return String(x);
    }
    function joinArr(arr){
      if (!Array.isArray(arr) || arr.length === 0) return "";
      return arr.join(", ");
    }

    function renderItem(item){
      var v = item.volumeInfo || {};
      var s = item.searchInfo || {};
      var img = (v.imageLinks && (v.imageLinks.thumbnail || v.imageLinks.smallThumbnail)) || "";

      var authors = joinArr(v.authors) || "N/A";
      var pub = safeText(v.publisher) || "N/A";
      var date = safeText(v.publishedDate) || "N/A";

      var links = '<div class="links">';
      if (v.previewLink) links += '<a href="' + v.previewLink + '" target="_blank" rel="noopener">Preview</a>';
      if (v.infoLink) links += '<a href="' + v.infoLink + '" target="_blank" rel="noopener">Info</a>';
      if (v.canonicalVolumeLink) links += '<a href="' + v.canonicalVolumeLink + '" target="_blank" rel="noopener">Canonical</a>';
      if (item.selfLink) links += '<a href="' + item.selfLink + '" target="_blank" rel="noopener">API</a>';
      links += '</div>';

      var snippet = safeText(s.textSnippet);
      if (!snippet && v.description) snippet = safeText(v.description);

      return ''
        + '<div class="card">'
        +   '<div class="row">'
        +     '<div>'
        +       (img ? '<img class="thumb" alt="Cover thumbnail" src="' + img + '">' : '<div class="thumb small" style="display:flex;align-items:center;justify-content:center;padding:8px;">No image</div>')
        +     '</div>'
        +     '<div>'
        +       '<h3 class="title">' + safeText(v.title) + '</h3>'
        +       (v.subtitle ? '<div class="meta">' + safeText(v.subtitle) + '</div>' : '')
        +       '<div class="meta"><b>Authors:</b> ' + authors + '</div>'
        +       '<div class="meta"><b>Publisher:</b> ' + pub + ' • <b>Published:</b> ' + date + '</div>'
        +       '<div class="meta"><b>Language:</b> ' + (safeText(v.language) || "N/A") + ' • <b>Print Type:</b> ' + (safeText(v.printType) || "N/A") + '</div>'
        +       (snippet ? '<p class="snippet">' + snippet + '</p>' : '<p class="snippet small">No description/snippet available.</p>')
        +       links
        +     '</div>'
        +   '</div>'
        + '</div>';
    }

    $(function(){
      $("#gridBtn").on("click", function(){ $("#results").removeClass("list").addClass("grid"); });
      $("#listBtn").on("click", function(){ $("#results").removeClass("grid").addClass("list"); });

      $.getJSON("google-books-search.json")
        .done(function(data){
          var items = data.items || [];
          $("#status").hide();
          $("#results").show();

          if (!Array.isArray(items) || items.length === 0){
            $("#results").html('<div class="err"><b>No results:</b> items[] was empty in google-books-search.json.</div>');
            return;
          }

          var html = "";
          for (var i=0; i<items.length; i++){
            html += renderItem(items[i]);
          }
          $("#results").html(html);
        })
        .fail(function(){
          $("#status").html('<div class="err"><b>Error:</b> Could not load google-books-search.json. Make sure it is in the same folder and you are running from a web server.</div>');
        });
    });
  </script>
</body>
</html>
