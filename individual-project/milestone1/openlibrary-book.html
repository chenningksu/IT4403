<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Milestone 1 - OpenLibrary (Single Book)</title>
  <style>
    :root{--bg:#f4f6f8;--card:#fff;--text:#111827;--muted:#4b5563;--brand:#0b3c5d;--border:#e5e7eb;}
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);line-height:1.5}
    header{background:var(--brand);color:#fff;padding:22px 16px}
    header h1{margin:0 0 6px;font-size:1.6rem}
    header p{margin:0;color:rgba(255,255,255,.85)}
    main{max-width:1100px;margin:0 auto;padding:18px 16px 40px}
    .small{font-size:.92rem;color:var(--muted)}
    .card{background:var(--card);border:1px solid var(--border);border-radius:14px;box-shadow:0 1px 8px rgba(0,0,0,.06)}
    .content{padding:16px}
    .grid{display:grid;grid-template-columns:220px 1fr;gap:16px}
    @media (max-width:820px){.grid{grid-template-columns:1fr}}
    .cover{width:100%;border:1px solid var(--border);border-radius:10px;background:#fff}
    .kvs{display:grid;grid-template-columns:180px 1fr;gap:10px;margin-top:12px}
    @media (max-width:820px){.kvs{grid-template-columns:1fr}}
    .k{color:var(--muted);font-size:.92rem}
    .err{background:#fff1f2;border:1px solid #ffe4e6;color:#9f1239;padding:12px;border-radius:12px}
    ul{margin:8px 0 0}
  </style>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>
  <header>
    <h1>OpenLibrary JSON — Single Book Display</h1>
    <p>IT 4403 Individual Project • Milestone 1 • Chris Henning</p>
  </header>

  <main>
    <div class="small">Data source: <b>openlibrary-book.json</b></div>
    <div id="status" class="small" style="margin-top:10px;">Loading JSON…</div>

    <div id="app" class="card" style="display:none;margin-top:12px;">
      <div class="content" id="book"></div>
    </div>
  </main>

  <script>
    function safeText(x){ return (x===null || x===undefined) ? "" : String(x); }
    function joinNames(arr){
      if (!Array.isArray(arr) || arr.length === 0) return "";
      return arr.map(function(o){ return o && o.name ? o.name : ""; }).filter(Boolean).join(", ");
    }

    $(function(){
      $.getJSON("openlibrary-book.json")
        .done(function(data){
          $("#status").hide(); $("#app").show();

          // file format: { "ISBN:xxxx": { ...book... } }
          var keys = Object.keys(data || {});
          if (!keys.length){ $("#book").html('<div class="err">No book data found.</div>'); return; }

          var entry = data[keys[0]] || {};
          var cover = entry.cover ? (entry.cover.large || entry.cover.medium || entry.cover.small) : "";
          var toc = entry.table_of_contents || [];

          var tocHtml = "<div class='small'>No table of contents.</div>";
          if (Array.isArray(toc) && toc.length){
            tocHtml = "<ul>" + toc.map(function(t){ return "<li>" + safeText(t.title) + "</li>"; }).join("") + "</ul>";
          }

          var html = ''
            + '<div class="grid">'
            +   '<div>'
            +     (cover ? '<img class="cover" alt="Book cover" src="'+cover+'">' : '<div class="cover small" style="padding:10px;">No cover image</div>')
            +     '<div class="small" style="margin-top:10px;"><b>Record Key:</b> ' + safeText(keys[0]) + '</div>'
            +   '</div>'
            +   '<div>'
            +     '<h2 style="margin:0 0 6px;">' + safeText(entry.title) + '</h2>'
            +     (entry.subtitle ? '<div class="small" style="margin-bottom:8px;">' + safeText(entry.subtitle) + '</div>' : '')
            +     '<div class="kvs">'
            +       '<div class="k">Authors</div><div>' + (joinNames(entry.authors) || "N/A") + '</div>'
            +       '<div class="k">Publishers</div><div>' + (joinNames(entry.publishers) || "N/A") + '</div>'
            +       '<div class="k">Publish Date</div><div>' + (safeText(entry.publish_date) || "N/A") + '</div>'
            +       '<div class="k">Pagination</div><div>' + (safeText(entry.pagination) || "N/A") + '</div>'
            +       '<div class="k">OpenLibrary URL</div><div>' + (entry.url ? '<a href="'+entry.url+'" target="_blank" rel="noopener">'+entry.url+'</a>' : "N/A") + '</div>'
            +     '</div>'
            +     '<div style="margin-top:14px;border-top:1px solid var(--border);padding-top:12px;">'
            +       '<h3 style="margin:0 0 8px;">Table of Contents</h3>'
            +       tocHtml
            +     '</div>'
            +   '</div>'
            + '</div>';

          $("#book").html(html);
        })
        .fail(function(){
          $("#status").html('<div class="err"><b>Error:</b> Could not load openlibrary-book.json.</div>');
        });
    });
  </script>
</body>
</html>
